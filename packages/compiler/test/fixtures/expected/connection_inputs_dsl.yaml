schema_version: "2.0"
global_configuration:
  developer_name: ConnectionInputsTest
  label: Connection Inputs Test Agent
  description: Test agent demonstrating connection input parameters
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: support@example.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Welcome! How can I assist you today?
      message_type: Welcome
    - message: An error occurred. Please try again.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: user_name
      label: User Name
      description: Customer name
      data_type: string
      is_list: false
      visibility: Internal
    - developer_name: issue_resolved
      label: Issue Resolved
      description: Whether the issue has been resolved
      data_type: boolean
      is_list: false
      visibility: Internal
      default: false
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Main agent entry point
      tools:
        - type: action
          target: provide_support
          bound_inputs: {}
          llm_inputs:
            - query
          state_updates: []
          name: help_customer
          description: Provide customer support
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: provide_support
          label: Provide Support
          description: Provide support to the customer
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: CustomerSupport
          input_type:
            - developer_name: query
              label: Query
              description: Query
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: response
              label: Response
              description: Response
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a customer service agent with configurable surface parameters.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Assist customers with their inquiries.
                Be professional and helpful.
  surfaces:
    - surface_type: service_email
      adaptive_response_allowed: true
      outbound_route_configs:
        - outbound_route_type: OmniChannelFlow
          outbound_route_name: flow://EmailSupport
      input_parameters:
        - developer_name: LegalDisclosure
          label: Legal Disclosure
          description: Legal disclosure message to include in emails
          data_type: string
          default_value: "'This conversation may be recorded for quality assurance.'"
        - developer_name: MaxRetries
          label: Max Retries
          description: Maximum number of retry attempts
          data_type: double
          default_value: 3
        - developer_name: EnableAutoResponse
          label: Enable Auto Response
          description: Enable automatic response generation
          data_type: boolean
          default_value: true
        - developer_name: CustomSignature
          label: Custom Signature
          description: Custom email signature
          data_type: string
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Welcome! How can I assist you today?",
      "messageType": "Welcome"}, {"message": "An error occurred. Please try
      again.", "messageType": "Error"}]'
