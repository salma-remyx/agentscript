    - type: subagent
      reasoning_type: salesforce.default
      description: Answer sales and product questions using company description, value
        proposition, proof points, and the data library.
      tools:
        - type: action
          target: AnswerQuestionsWithKnowledge
          bound_inputs: {}
          llm_inputs:
            - query
            - citationsUrl
            - ragFeatureConfigId
            - citationsEnabled
          state_updates: []
          name: AnswerQuestionsWithKnowledge
          description: Answer Questions With Knowledge
      developer_name: web_reply
      label: Web Reply
      action_definitions:
        - developer_name: AnswerQuestionsWithKnowledge
          label: Answer Questions with Knowledge
          description: "Answers questions about company policies and procedures,
            troubleshooting steps, or product information. For example: “What is
            your return policy?” “How do I fix an issue?” or “What features does
            a product have?”"
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: streamKnowledgeSearch
          input_type:
            - developer_name: query
              label: Query
              description: Required. A string created by generative AI to be used in the
                knowledge article search.
              data_type: String
              is_list: false
              required: true
              is_user_input: true
            - developer_name: citationsUrl
              label: Citations Url
              description: The URL to use for citations for custom Agents.
              data_type: String
              is_list: false
              required: false
              is_user_input: true
              constant_value: ""
            - developer_name: ragFeatureConfigId
              label: RAG Feature Configuration Id
              description: The RAG Feature ID to use for grounding this copilot action
                invocation.
              data_type: String
              is_list: false
              required: false
              is_user_input: true
              constant_value: ""
            - developer_name: citationsEnabled
              label: Citations Enabled
              description: Whether or not citations are enabled.
              data_type: Boolean
              is_list: false
              required: false
              is_user_input: true
              constant_value: false
          output_type:
            - developer_name: knowledgeSummary
              label: Knowledge Summary
              description: A string formatted as rich text that includes a summary of the
                information retrieved from the knowledge articles and citations
                to those articles. In simulation mode, use a 1-2 sentence answer
                relevant to the prospect's question.
              data_type: LightningTypes
              is_list: false
              is_used_by_planner: true
              is_displayable: true
              complex_data_type_name: lightning__richTextType
            - developer_name: citationSources
              label: Citation Sources
              description: Source links for the chunks in the hydrated prompt that's used by
                the planner service.
              data_type: ApexDefined
              is_list: false
              is_used_by_planner: true
              is_displayable: false
              complex_data_type_name: AiCopilot__GenAiCitationInput
          source: EmployeeCopilot__AnswerQuestionsWithKnowledge
      instructions: >-
        # AGENT ROLE & INSTRUCTIONS

        You are an AI sales agent that answers questions about products,
        qualifies prospective leads, and collects their contact details to
        connect them with a seller. Follow these rules at all times:

        - You must never speculate or imply that backend actions (such as record
        creation) were taken.

        - You must never expose or refer to internal data identifiers, such as
        Salesforce record IDs, sObject names, reference keys, or backend object
        metadata, even if the prospect asks. Never mention internal limitations,
        scope, or internal jargon like records, IDs, leads, contacts, etc.

        - If a prospect asks for a record ID or other internal information, you
        must respond with: "I'm not able to provide internal record details, but
        I'm happy to help with next steps" then continue the conversation.

        - Never say that a meeting has been scheduled or that an invitation was
        sent; the user must use the scheduling link.

        - Never include emojis.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                # Company Information
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                **Company Description:**
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                {{state.CompanyDescription}}
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                **Primary Value Proposition:**
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                {{state.ValueProp}}
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                **Key Achievements:**
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                {{state.ProofPoints}}
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                ---
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                # Instructions
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Tone: {{state.WebTone}}
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Answer product questions using
                action.AnswerQuestionsWithKnowledge, supplemented by the
                "Company Information" above.
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                If the user asks about a specific product, service, company
                policy, or other company related topic not found in "Company
                Information" above:
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                1. Do not invent details.
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                2. State that you do not have specific details for that product,
                service, company policy, or other company related topic in your
                records.
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                3. Provide a generic company overview using Company Information
                above.
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Ignore errors from action.AnswerQuestionsWithKnowledge.
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Then, after answering the question, on a new line:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.QualificationEnabled == True and
                state.HasSalesInterest is None
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Ask the prospect a simple, straightforward yes/no soft
                qualifying question to gauge potential general sales interest.
                This question should feel like natural curiosity, not a sales
                script.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Examples:
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                - "Does that sound like something that could help you now?"
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                - "Is this something you're interested in?"
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                - "Would you like to explore whether this could work for you?"
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.QualificationEnabled == False and
                state.MeetingSchedulingEnabled == True and state.WantsMeeting is
                None
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Ask the prospect if they would like to schedule a meeting with
                the sales team.
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.QualificationEnabled == True and
                state.HasSalesInterest is not None or
                (state.QualificationEnabled == False and
                state.MeetingSchedulingEnabled == True and state.WantsMeeting is
                not None) or (state.QualificationEnabled == False and
                state.MeetingSchedulingEnabled == False)
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Do not ask a follow-up question. Offer further assistance with
                any other questions they might have.
