        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                If the prospect has already provided all required fields in
                their message, skip the required fields question entirely and
                only ask one qualifying question.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
