                Use the Seller Id to retrieve only the seller's name and email
                address before responding. Briefly explain the link couldn't be
                generated and offer the seller's name and email address as an
                alternative contact method. Do not offer anything else.
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
