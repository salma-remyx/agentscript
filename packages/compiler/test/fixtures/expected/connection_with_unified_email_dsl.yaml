        - type: action
          target: __state_update_action__
          state_updates:
            - ActiveFlow: '""'
            - VerificationAttemptCount: "0"
            - VerifiedCustomerEmail: '""'
            - VerifiedSecretKey: '""'
            - VerificationSuccess: '""'
          name: exit_verification
          description: Call when the prospect explicitly wants to stop the verification
            process and do something else, such as asking about products.
          bound_inputs: {}
          llm_inputs: []
          input_parameters: []
      developer_name: customer_verification_handling
      label: Customer Verification Handling
      action_definitions:
        - developer_name: SendVerificationEmail
          label: Send Verification Email
          description: Sends a generated verification code to the user's email address to
            verify the user.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: sales_inbound_flows__SendVerifyCode
          input_type:
            - developer_name: customerEmail
              label: Customer Email
              description: Stores the email address provided by the customer for verification.
                Customer submission of the email address initiates the
                verification process.
              data_type: String
              is_list: false
              required: true
              is_user_input: true
              complex_data_type_name: lightning__textType
          output_type:
            - developer_name: secretKey
              label: Secret Key
              description: Stores the secret key used to generate the verification code.
              data_type: String
              is_list: false
              is_used_by_planner: false
              is_displayable: false
            - developer_name: verificationCode
              label: Verification Code
              description: Stores the generated verification code.
              data_type: String
              is_list: false
              is_used_by_planner: false
              is_displayable: false
            - developer_name: verificationMessage
              label: Verification Message
              description: "Stores the verification message to display to the user upon
