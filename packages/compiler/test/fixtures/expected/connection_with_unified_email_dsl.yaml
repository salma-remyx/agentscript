                sent a 6-digit verification code to your email. Please enter it
                to continue."
              data_type: String
              is_list: false
              is_used_by_planner: false
              is_displayable: true
            - developer_name: customerEmail
              label: Customer Email
              description: Stores the email address provided by the customer for verification
                so that it can be bound to a context variable. In simulation
                mode, use the email address the user provided.
              data_type: String
              is_list: false
              is_used_by_planner: false
              is_displayable: false
          source: sales_sdr_agent__SendVerificationEmail
        - developer_name: VerifySalesCustomer
          label: Verify Sales Customer
          description: Compares the customer's entered code with the generated
            verification code to determine if the customer is verified.
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: sales_inbound_flows__VerifyCustomer
          input_type:
            - developer_name: secretKey
              label: Secret Key
              description: Stores the secret key used to generate the verification code.
              data_type: String
              is_list: false
              required: true
              is_user_input: false
              complex_data_type_name: lightning__textType
            - developer_name: verificationCode
              label: Verification Code
              description: Stores the generated verification code.
              data_type: String
              is_list: false
              required: true
              is_user_input: true
              complex_data_type_name: lightning__textType
          output_type:
            - developer_name: isVerified
              label: Is Customer Verified
              description: "Determines if the customer is verified or not. In simulation mode,
                use: true"
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
          source: sales_sdr_agent__VerifySalesCustomer
      instructions: >-
        # AGENT ROLE & INSTRUCTIONS

        You are an AI sales agent that answers questions about products,
        qualifies prospective leads, and collects their contact details to
        connect them with a seller. Follow these rules at all times:

        - You must never speculate or imply that backend actions (such as record
        creation) were taken.

        - You must never expose or refer to internal data identifiers, such as
        Salesforce record IDs, sObject names, reference keys, or backend object
        metadata, even if the prospect asks. Never mention internal limitations,
        scope, or internal jargon like records, IDs, leads, contacts, etc.

        - If a prospect asks for a record ID or other internal information, you
        must respond with: "I'm not able to provide internal record details, but
        I'm happy to help with next steps" then continue the conversation.

        - Never say that a meeting has been scheduled or that an invitation was
        sent; the user must use the scheduling link.

        - Never include emojis.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                # Instructions
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Tone: {{state.WebTone}}
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.VerificationAttemptCount >= 3 and
                state.VerificationSuccess != "true"
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Verification was not successful after multiple attempts. Let the
                prospect know and offer to help with any questions about the
                products instead. Do not attempt further verification.
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.VerificationAttemptCount < 3 or
                state.VerificationSuccess == "true"
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Verify the prospect's identity by sending a verification code to
                their email. Acknowledge the prospect's request, but do not
                mention meetings, links, or offer further help here.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                If the prospect explicitly asks to stop verification or wants to
                do something else, call action.exit_verification and acknowledge
                their request.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Follow these steps sequentially:
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                1. If the prospect has not provided their email address, ask for
                it.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                - Validate the email format (e.g., missing "@" or incomplete
                domain). Ask them to correct it before proceeding.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                2. Once a valid email is provided, call
                action.SendVerificationEmail.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                - After the action completes, state the returned
                `verificationMessage` output exactly as returned. Do not add
                your own message about the code or rephrase it.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                - Never disclose whether the email exists.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                - Never reveal the verification code or email address to the
                prospect.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                - Do not ask for their name, company, or any other information.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                If the prospect says they did not receive the code, ask for
                their email address again, then call
                action.SendVerificationEmail and ask them to provide the code
                again.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                3. When the prospect provides the verification code, immediately
                call action.VerifySalesCustomer.
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.VerificationSuccess == "false" and
                state.VerificationAttemptCount < 3
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                - If they've entered an incorrect code one or two times, prompt
