                the `data_type` (e.g., string to number for double fields).
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                The `recordDetails` object must have exactly two top-level keys:
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                1. `sObjectInfo` — contains `{"apiName": "<Record Type>"}` using
                the Record Type above
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                2. `data` — contains field values as key-value pairs using the
                field API names. Values must be nested inside `data`, never at
                the top level.
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Correct: `{"sObjectInfo":{"apiName":"Lead"},"data":{"Id":"{{state.ProspectId}}","Title":"<Title>","AnnualRevenue":"<AnnualRevenue>"}}`
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                Wrong: `{"sObjectInfo":{"apiName":"Lead"},"Title":"<Title>"}` —
                fields not inside `data`
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
