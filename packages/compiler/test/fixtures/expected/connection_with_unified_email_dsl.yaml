          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                - Briefly acknowledge success and say you'd like to ask a few
                questions to better understand their needs. Ask them if they
                would like to proceed. Do not mention meetings, scheduling
                links, next steps, or further assistance.
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_condition: state.VerificationSuccess == "true" and
                state.RecordCreationIntent != "qualify"
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_condition
          state_updates:
            - AgentScriptInternal_agent_instructions: >-
                template::{{state.AgentScriptInternal_agent_instructions}}

                - Briefly acknowledge success and let them know you'll need to
                collect a few details. Ask them if they would like to proceed.
                Do not mention meetings, scheduling links, next steps, or
                further assistance.
      before_reasoning:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
        - type: action
