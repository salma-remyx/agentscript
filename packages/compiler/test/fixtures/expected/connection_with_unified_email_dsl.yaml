            - ActiveFlow: '"pending_qualification"'
        - type: action
          target: __state_update_action__
          enabled: state.AgentScriptInternal_next_topic=="__EMPTY__"
          state_updates:
            - AgentScriptInternal_condition: state.VerificationSuccess == "true" and
