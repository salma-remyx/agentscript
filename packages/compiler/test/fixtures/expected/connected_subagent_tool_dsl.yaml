schema_version: "2.0"
global_configuration:
  developer_name: ConnectedAgentToolTest
  label: Connected Agent Tool Test
  description: Connected Agent Tool Test
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables:
    - developer_name: Customer_Id
      label: Customer Id
      description: Customer identifier
      data_type: string
      field_mapping: MessagingEndUser.ContactId
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages: []
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
    - developer_name: Order_Id
      label: Order Id
      description: Order Id
      data_type: string
      is_list: false
      visibility: Internal
  initial_node: Main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Main coordinator
      tools:
        - type: action
          target: Lookup_Order
          bound_inputs:
            order_id: state.Order_Id
          llm_inputs: []
          state_updates: []
          name: lookup
          description: Lookup
        - type: supervision
          target: Support_Agent
          state_updates: []
          name: call_support
          description: Delegate to support
        - type: supervision
          target: Search_Agent
          state_updates: []
          name: call_search
          description: Search with LLM query
        - type: supervision
          target: Feedback_Agent
          state_updates: []
          name: call_feedback
          description: Collect feedback
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_next_topic: '"Billing"'
          name: go_billing
          description: Route to billing
      developer_name: Main
      label: Main
      action_definitions:
        - developer_name: Lookup_Order
          label: Lookup Order
          description: Look up an order
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: Lookup_Order
          input_type:
            - developer_name: order_id
              label: Order Id
              description: Order Id
              data_type: String
              is_list: false
              required: false
              is_user_input: false
          output_type:
            - developer_name: status
              label: Status
              description: Status
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Route requests to the appropriate agent.
      after_all_tool_calls:
        - type: handoff
          target: Billing
          enabled: state.AgentScriptInternal_next_topic=="Billing"
          state_updates:
            - AgentScriptInternal_next_topic: '"__EMPTY__"'
    - type: subagent
      reasoning_type: salesforce.default
      description: Billing topic
      tools: []
      developer_name: Billing
      label: Billing
      action_definitions: []
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                Handle billing inquiries.
    - type: related_agent
      developer_name: Support_Agent
      label: Support Agent
      description: Handles customer support
      invocation_target_type: "agent"
      invocation_target_name: "Support_Agent"
      loading_text: Connecting you to support...
    - type: related_agent
      developer_name: Search_Agent
      label: Search Agent
      description: Searches order history
      invocation_target_type: "agent"
      invocation_target_name: "Search_Agent"
      bound_inputs:
        customer_id: variables.Customer_Id
    - type: related_agent
      developer_name: Feedback_Agent
      label: Feedback Agent
      description: Collects customer feedback
      invocation_target_type: "agent"
      invocation_target_name: "Feedback_Agent"
      bound_inputs:
        customer_id: variables.Customer_Id
        session_tag: variables.Customer_Id
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
