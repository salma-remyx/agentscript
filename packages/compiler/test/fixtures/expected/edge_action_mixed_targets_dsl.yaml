# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Mixed_Targets_Agent
  label: Mixed Targets Agent
  description: Agent with one action of each supported target type
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I have access to multiple service types.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent with one action of each supported target type
      tools:
        - type: action
          target: Flow_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Flow
          description: Use Flow
        - type: action
          target: Apex_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Apex
          description: Use Apex
        - type: action
          target: External_Service_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_External
          description: Use External
        - type: action
          target: Standard_Invocable_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Standard
          description: Use Standard
        - type: action
          target: Mcp_Tool_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Mcp
          description: Use Mcp
        - type: action
          target: Slack_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Slack
          description: Use Slack
        - type: action
          target: Named_Query_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Named_Query
          description: Use Named Query
        - type: action
          target: Retriever_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Retriever
          description: Use Retriever
        - type: action
          target: Quick_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Quick
          description: Use Quick
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Flow_Action
          label: Flow Action
          description: Action using flow target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: flow
          invocation_target_name: MyFlowAction
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: flow_result
              label: Flow Result
              description: Flow Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Apex_Action
          label: Apex Action
          description: Action using apex target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: apex
          invocation_target_name: MyController.myMethod
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: apex_result
              label: Apex Result
              description: Apex Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: External_Service_Action
          label: External Service Action
          description: Action using externalService target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: externalService
          invocation_target_name: MyExternalService.myOperation
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: external_result
              label: External Result
              description: External Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Standard_Invocable_Action
          label: Standard Invocable Action
          description: Action using standardInvocableAction target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: standardInvocableAction
          invocation_target_name: MyStandardAction
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: standard_result
              label: Standard Result
              description: Standard Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Mcp_Tool_Action
          label: Mcp Tool Action
          description: Action using mcpTool target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: mcpTool
          invocation_target_name: MyMcpTool
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: mcp_result
              label: Mcp Result
              description: Mcp Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Slack_Action
          label: Slack Action
          description: Action using slack target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: slack
          invocation_target_name: MySlackAction
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: slack_result
              label: Slack Result
              description: Slack Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Named_Query_Action
          label: Named Query Action
          description: Action using namedQuery target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: namedQuery
          invocation_target_name: MyNamedQuery
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: query_result
              label: Query Result
              description: Query Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Retriever_Action
          label: Retriever Action
          description: Action using retriever target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: retriever
          invocation_target_name: MyRetriever
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: retrieval_result
              label: Retrieval Result
              description: Retrieval Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Quick_Action
          label: Quick Action
          description: Action using quickAction target
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: quickAction
          invocation_target_name: MyQuickAction
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: quick_result
              label: Quick Result
              description: Quick Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful assistant with access to multiple action types.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                You have access to several different action types.
                Use the appropriate action based on the user's request.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I have access to multiple service
      types.", "messageType": "Welcome"}, {"message": "An error occurred while
      processing your request.", "messageType": "Error"}]'
