# NOTE: Differs from Python compiler — TS uses explicit label for input descriptions
# when no description is set. Python uses normalizeDeveloperName(name) instead,
# which discards the author's explicit label.
schema_version: "2.0"
global_configuration:
  developer_name: Alias_Targets_Agent
  label: Alias Targets Agent
  description: Agent exercising the four action target alias schemes
  enable_enhanced_event_logs: false
  agent_type: EinsteinServiceAgent
  context_variables: []
  default_agent_user: user@test.com
agent_version:
  planner_type: Atlas__ConcurrentMultiAgentOrchestration
  system_messages:
    - message: Hello! I exercise alias translation.
      message_type: Welcome
    - message: An error occurred while processing your request.
      message_type: Error
  state_variables:
    - developer_name: AgentScriptInternal_next_topic
      label: Next Topic
      description: The next topic to be visited
      data_type: string
      is_list: false
      default: '"__EMPTY__"'
      visibility: Internal
    - developer_name: AgentScriptInternal_agent_instructions
      label: Agent Instructions
      description: The agent instructions
      data_type: string
      is_list: false
      default: "''"
      visibility: Internal
    - developer_name: AgentScriptInternal_condition
      label: Runtime Condition
      description: Runtime condition evaluation for if statements
      data_type: boolean
      is_list: false
      visibility: Internal
  initial_node: main
  nodes:
    - type: subagent
      reasoning_type: salesforce.default
      description: Agent exercising the four action target alias schemes
      tools:
        - type: action
          target: Prompt_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Prompt
          description: Use Prompt
        - type: action
          target: Service_Catalog_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Catalog
          description: Use Catalog
        - type: action
          target: Integration_Procedure_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Integration
          description: Use Integration
        - type: action
          target: Expression_Set_Action
          bound_inputs: {}
          llm_inputs:
            - input_val
          state_updates: []
          name: Use_Expression
          description: Use Expression
      developer_name: main
      label: Main
      action_definitions:
        - developer_name: Prompt_Action
          label: Prompt Action
          description: Action using the prompt:// alias (maps to generatePromptResponse)
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: generatePromptResponse
          invocation_target_name: Confirm_Lead_Attributes
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: prompt_result
              label: Prompt Result
              description: Prompt Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Service_Catalog_Action
          label: Service Catalog Action
          description: Action using the serviceCatalog:// alias (maps to
            createCatalogItemRequest)
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: createCatalogItemRequest
          invocation_target_name: MyCatalogItem
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: catalog_result
              label: Catalog Result
              description: Catalog Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Integration_Procedure_Action
          label: Integration Procedure Action
          description: Action using the integrationProcedureAction:// alias (maps to
            executeIntegrationProcedure)
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: executeIntegrationProcedure
          invocation_target_name: MyIntegrationProcedure
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: ip_result
              label: Integration Procedure Result
              description: Ip Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
        - developer_name: Expression_Set_Action
          label: Expression Set Action
          description: Action using the expressionSet:// alias (maps to runExpressionSet)
          require_user_confirmation: false
          include_in_progress_indicator: false
          invocation_target_type: runExpressionSet
          invocation_target_name: MyExpressionSet
          input_type:
            - developer_name: input_val
              label: Input Value
              description: Input Value
              data_type: String
              is_list: false
              required: true
              is_user_input: false
          output_type:
            - developer_name: expr_result
              label: Expression Set Result
              description: Expr Result
              data_type: String
              is_list: false
              is_used_by_planner: true
              is_displayable: false
      instructions: You are a helpful assistant that exercises action target alias
        translation.
      focus_prompt: "{{state.AgentScriptInternal_agent_instructions}}"
      before_reasoning_iteration:
        - type: action
          target: __state_update_action__
          enabled: "True"
          state_updates:
            - AgentScriptInternal_agent_instructions: "''"
        - type: action
          target: __state_update_action__
          state_updates:
            - AgentScriptInternal_agent_instructions: |-
                template::{{state.AgentScriptInternal_agent_instructions}}
                You have access to four alias-form action targets.
  surfaces: []
  modality_parameters: {}
  additional_parameters:
    reset_to_initial_node: true
    system_messages: '[{"message": "Hello! I exercise alias translation.",
      "messageType": "Welcome"}, {"message": "An error occurred while processing
      your request.", "messageType": "Error"}]'
